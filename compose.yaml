services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped

  atmos-backend:
    image: ghcr.io/dy-2001/atmos-backend:latest
    container_name: atmos-backend
    restart: unless-stopped
    env_file:
      - ./ATMOS-Backend-main/.env
    depends_on:
      - mongodb
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - atmos-backend

volumes:
  mongodb_data: